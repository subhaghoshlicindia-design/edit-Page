<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="profile-header">
    <div class="cover-photo">
      <img id="edit-cover-preview" src="" alt="Cover Photo Preview" style="display: none;" />
      <div class="cover-label" id="edit-cover-label">Cover photo preview</div>
    </div>
    <div class="profile-bar container">
      <div class="profile-main">
        <div class="avatar-wrapper">
          <img id="edit-profile-preview" class="avatar-image" src="https://via.placeholder.com/120?text=Profile+Photo" alt="Profile Preview" />
        </div>
        <div class="profile-meta">
          <h1>Edit Your Profile</h1>
          <p>Update the image, about text, details and services available on the public profile.</p>
        </div>
      </div>
    </div>
  </header>

  <main class="container editor-page">
    <div class="editor-card">
      <div class="editor-header">
        <div>
          <h1>Edit Profile</h1>
          <p>Change the profile photo, cover image, about section, details, and services.</p>
        </div>
        <a class="btn btn-secondary" href="index.html">View Profile</a>
      </div>
      <form id="profile-form">
        <div class="form-grid">
          <div class="field file-preview">
            <label for="profile-photo">Profile Photo</label>
            <input type="file" id="profile-photo" accept="image/*" />
            <img id="profile-photo-preview" src="https://via.placeholder.com/380x180?text=Profile+Preview" alt="Profile Preview" />
          </div>
          <div class="field file-preview">
            <label for="cover-photo">Cover Photo</label>
            <input type="file" id="cover-photo" accept="image/*" />
            <img id="cover-photo-preview" src="https://via.placeholder.com/800x240?text=Cover+Preview" alt="Cover Preview" />
          </div>
          <div class="field">
            <label for="profile-name-input">Name</label>
            <input type="text" id="profile-name-input" placeholder="Priya Sharma" />
          </div>
          <div class="field">
            <label for="profile-title-input">Title</label>
            <input type="text" id="profile-title-input" placeholder="Financial Advisor · Wealth planner · Investment strategist" />
          </div>
          <div class="field">
            <label for="about-input">About</label>
            <textarea id="about-input" placeholder="Write a short bio about yourself."></textarea>
          </div>
          <div class="field">
            <label for="detail-location-input">Location</label>
            <input type="text" id="detail-location-input" placeholder="Mumbai, India" />
          </div>
          <div class="field">
            <label for="detail-work-input">Work</label>
            <input type="text" id="detail-work-input" placeholder="Certified Financial Planner" />
          </div>
          <div class="field">
            <label for="detail-website-input">Website</label>
            <input type="text" id="detail-website-input" placeholder="www.priyafinance.com" />
          </div>
          <div class="field">
            <label for="services-input">Services</label>
            <input type="text" id="services-input" placeholder="Investment Planning, Retirement, Tax Strategy" />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary save-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </main>

  <script>
    const profilePhotoInput = document.getElementById('profile-photo');
    const coverPhotoInput = document.getElementById('cover-photo');
    const profilePhotoPreview = document.getElementById('profile-photo-preview');
    const coverPhotoPreview = document.getElementById('cover-photo-preview');
    const editProfilePreview = document.getElementById('edit-profile-preview');
    const editCoverPreview = document.getElementById('edit-cover-preview');
    const editCoverLabel = document.getElementById('edit-cover-label');

    const nameInput = document.getElementById('profile-name-input');
    const titleInput = document.getElementById('profile-title-input');
    const aboutInput = document.getElementById('about-input');
    const locationInput = document.getElementById('detail-location-input');
    const workInput = document.getElementById('detail-work-input');
    const websiteInput = document.getElementById('detail-website-input');
    const servicesInput = document.getElementById('services-input');
    const form = document.getElementById('profile-form');

    function loadSavedProfile() {
      const savedPhoto = localStorage.getItem('profilePhoto');
      const savedCover = localStorage.getItem('coverPhoto');
      const savedName = localStorage.getItem('profileName');
      const savedTitle = localStorage.getItem('profileTitle');
      const savedAbout = localStorage.getItem('aboutText');
      const savedLocation = localStorage.getItem('detailLocation');
      const savedWork = localStorage.getItem('detailWork');
      const savedWebsite = localStorage.getItem('detailWebsite');
      const savedServices = localStorage.getItem('servicesList');

      if (savedPhoto) {
        profilePhotoPreview.src = savedPhoto;
        editProfilePreview.src = savedPhoto;
      }
      if (savedCover) {
        coverPhotoPreview.src = savedCover;
        editCoverPreview.src = savedCover;
        editCoverPreview.style.display = 'block';
        editCoverLabel.style.display = 'none';
      }
      if (savedName) nameInput.value = savedName;
      if (savedTitle) titleInput.value = savedTitle;
      if (savedAbout) aboutInput.value = savedAbout;
      if (savedLocation) locationInput.value = savedLocation;
      if (savedWork) workInput.value = savedWork;
      if (savedWebsite) websiteInput.value = savedWebsite;
      if (savedServices) servicesInput.value = savedServices;
    }

    function handleFileUpload(input, previewElement, storageKey) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        localStorage.setItem(storageKey, reader.result);
        previewElement.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    profilePhotoInput.addEventListener('change', () => {
      handleFileUpload(profilePhotoInput, profilePhotoPreview, 'profilePhoto');
      handleFileUpload(profilePhotoInput, editProfilePreview, 'profilePhoto');
    });

    coverPhotoInput.addEventListener('change', () => {
      handleFileUpload(coverPhotoInput, coverPhotoPreview, 'coverPhoto');
      handleFileUpload(coverPhotoInput, editCoverPreview, 'coverPhoto');
      editCoverPreview.style.display = 'block';
      editCoverLabel.style.display = 'none';
    });

    form.addEventListener('submit', event => {
      event.preventDefault();
      localStorage.setItem('profileName', nameInput.value.trim() || 'Priya Sharma');
      localStorage.setItem('profileTitle', titleInput.value.trim() || 'Financial Advisor · Wealth planner · Investment strategist');
      localStorage.setItem('aboutText', aboutInput.value.trim() || 'Financial advisor helping professionals and business owners build long-term wealth with personalized investment planning, retirement guidance, and tax-smart strategies.');
      localStorage.setItem('detailLocation', locationInput.value.trim() || 'Mumbai, India');
      localStorage.setItem('detailWork', workInput.value.trim() || 'Certified Financial Planner');
      localStorage.setItem('detailWebsite', websiteInput.value.trim() || 'www.priyafinance.com');
      localStorage.setItem('servicesList', servicesInput.value.trim() || 'Investment Planning, Retirement, Tax Strategy, Portfolio Review, Wealth Growth');
      alert('Profile saved. Open the profile page to see the updates.');
    });

    loadSavedProfile();
  </script>
</body>
</html>
